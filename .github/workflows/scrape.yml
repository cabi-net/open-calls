name: Weekly Open Calls Digest

on:
  schedule:
    - cron: '0 8 * * 1'  # every Monday at 8am UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright feedparser beautifulsoup4 requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scrape.py

      - name: Commit digest
        run: |
          git config user.name "open-calls bot"
          git config user.email "bot@opencalls"
          git add digest/
          git diff --staged --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="📋 *open calls digest — ${DIGEST_DATE}*%0A${DIGEST_COUNT} opportunities collected%0A%0A[view digest](https://github.com/${{ github.repository }}/blob/main/digest/${DIGEST_DATE}.md)"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown"
